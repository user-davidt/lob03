<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Introduction to basic HTML Form elements">
    <meta name="keywords" content="HTML, Form, tags">
    <meta name="author" content="David Tucker">
    <title>HTML example form</title>
</head>

<body>
    <form method="post" action="http://mercury.swin.edu.au/it000000/formtest.php">
        <img src="swin_logo.png" alt="Swinburne University of Technology logo">
        <h1>CWA Helpdesk Appointment</h1>
        <p>
            The Help Desk is located in ATC620. Open 10:30 to 19:00 Monday to Friday
        </p>
        <p>
            Check the Blackboard for when the CWA Tutors will be there
        </p>
        <p>
        <fieldset>
            <legend>Student Details</legend>
            <p>
                <label for="student_id">Student ID</label>
                <input type="text" name="student_id" id="student_id" required="required" pattern="[0-9]+">
            </p>
            <p>
                <label for="given_name">Given Name</label>
                <input type="text" name="given_name" id="given_name" required="required" pattern="[A-Za-z\s\-']+"
                    title="Given name must only contain letters, spaces, hyphens or apostrophes">

                <label for="family_name">Family Name</label>
                <input type="text" name="family_name" id="family_name" required="required" pattern="[A-Za-z\s\-']+"
                    title="Family name must only contain letters, spaces, hyphens or apostrophes">

            </p>

        </fieldset>
        <p>
        <fieldset>
            <legend>Your unit</legend>
            <p><label for="cos10011">COS10011</label>
                <input type="radio" id="cos10011" name="unit" value="cos10011">
                <label for="cos60004">COS60004</label>
                <input type="radio" id="cos60004" name="unit" value="cos60004">
                <label for="cos60007">COS60007</label>
                <input type="radio" id="cos60007" name="unit" value="cos60007">
            </p>
            <p><label for="tutor">Your Tutor</label>
                <select name="tutor" id="tutor" required="required">
                    <option value="">Please</option>
                    <option value="bob">Bob</option>
                    <option value="edward">Edward</option>

                </select>
            </p>


        </fieldset>
        <p>
        <fieldset>
            <legend> Issue</legend>
            <p><label for="html">HTML</label>
                <input type="radio" id="html" name="issue" value="html">

                <label for="css">CSS</label>
                <input type="radio" id="css" name="issue" value="css">
                <label for="php">PHP</label>
                <input type="radio" id="php" name="issue" value="php">
                <label for="mysql">MySQL</label>
                <input type="radio" id="mysql" name="issue" value="mysql">
            </p>
            <p><label for="issue_description">Description of Issue</label>
            <p>
                <textarea placeholder="Write description of your problem here..." id="issue_description"
                    name="issue_description" rows="4" cols="40" required="required"></textarea>
            </p>
        </fieldset>
        <fieldset>
            <legend> Preferred Date/Time</legend>
            <p><label for="pref_date">Date</label>
                <input type="date" name="pref_date" id="pref_date" size="10" required="required">
            </p>
            <p>
                <label for="pref_time">Time</label>
                <input type="time" name="pref_time" id="pref_time" size="4" required="required">
            </p>
        </fieldset>
        <input type="submit" value="Book">
        <input type="reset" value="Reset Form">
    </form>
</body>
